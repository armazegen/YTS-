name: Build ShortsAI APK From Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        sudo apt-get install unzip
        unzip -o *.zip -d .
        rm *.zip

    - name: Move files if nested inside a folder
      run: |
        if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
          echo "Files are nested inside a folder. Finding root directory..."
          SUBFOLDER=$(find . -maxdepth 2 -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | cut -d'/' -f2)
          if [ ! -z "$SUBFOLDER" ] && [ "$SUBFOLDER" != "." ]; then
            echo "Moving files from folder: $SUBFOLDER"
            mv "$SUBFOLDER"/* . 2>/dev/null || true
            mv "$SUBFOLDER"/.* . 2>/dev/null || true
          fi
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # FFmpeg aur JitPack libraries ko allow karne ke liye settings inject karna
    - name: Inject JitPack Repository
      run: |
        if [ -f "settings.gradle" ]; then
          sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' settings.gradle
        fi
        if [ -f "build.gradle" ]; then
          sed -i '/repositories {/a \        maven { url "https://jitpack.io" }' build.gradle
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload ShortsAI APK
      uses: actions/upload-artifact@v4
      with:
        name: ShortsAI-Debug-APK
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
