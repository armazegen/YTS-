name: Build ShortsAI APK From Zip

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Yeh step aapki upload ki hui zip file ko extract karega
    - name: Unzip Project Files
      run: |
        sudo apt-get install unzip
        unzip -o *.zip -d .
        rm *.zip # Zip file delete taake space bache

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Ensure Gradle Wrapper exists
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload ShortsAI APK
      uses: actions/upload-artifact@v4
      with:
        name: ShortsAI-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
